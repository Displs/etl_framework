# Local development stack for the etl-framework apprentice demo.
#
# Brings up: a Postgres OLTP source seeded with retail data, a MinIO bucket
# acting as the S3-compatible Lakehouse layer, an Apache Spark master+worker
# capable of running generated PySpark jobs against Iceberg tables, an
# Apache Airflow webserver+scheduler that picks up generated DAGs from the
# bind-mounted ./build/airflow directory, and an OpenMetadata server.
#
# This stack is **not** required to use the framework — `etlf generate`
# produces artifacts statically. The stack lets you actually execute them.

version: "3.9"

services:
  postgres-oltp:
    image: postgres:16-alpine
    container_name: etlf-postgres-oltp
    environment:
      POSTGRES_DB: retail
      POSTGRES_USER: oltp
      POSTGRES_PASSWORD: oltp
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - oltp-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: etlf-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-08-13T05-33-17Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 minio minio12345;
        mc mb -p local/warehouse || true;
      "

  spark-master:
    image: bitnami/spark:3.5
    container_name: etlf-spark-master
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: bitnami/spark:3.5
    container_name: etlf-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master

  airflow-postgres:
    image: postgres:16-alpine
    container_name: etlf-airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow-db:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    depends_on:
      - airflow-postgres
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname a --lastname b --role Admin --email a@b"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./build/airflow:/opt/airflow/dags:ro
      - airflow-logs:/opt/airflow/logs

  airflow-webserver:
    image: apache/airflow:2.9.3-python3.11
    container_name: etlf-airflow-webserver
    depends_on:
      - airflow-init
    command: webserver
    ports:
      - "8081:8080"
    environment: *airflow-env
    volumes:
      - ./build/airflow:/opt/airflow/dags:ro
      - airflow-logs:/opt/airflow/logs

  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    container_name: etlf-airflow-scheduler
    depends_on:
      - airflow-init
    command: scheduler
    environment: *airflow-env
    volumes:
      - ./build/airflow:/opt/airflow/dags:ro
      - airflow-logs:/opt/airflow/logs

  openmetadata:
    image: openmetadata/server:1.4.4
    container_name: etlf-openmetadata
    depends_on:
      - openmetadata-mysql
      - elasticsearch
    environment:
      DB_HOST: openmetadata-mysql
      DB_PORT: 3306
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      OM_DATABASE: openmetadata_db
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
    ports:
      - "8585:8585"

  openmetadata-mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: openmetadata_password
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: openmetadata_user
      MYSQL_PASSWORD: openmetadata_password
    volumes:
      - om-mysql:/var/lib/mysql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

volumes:
  oltp-data:
  minio-data:
  airflow-db:
  airflow-logs:
  om-mysql:
